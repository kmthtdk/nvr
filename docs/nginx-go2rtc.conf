# ─────────────────────────────────────────────────────────────────────────────
# Reverse proxy for go2rtc — DEPLOYMENT TEMPLATE (NOT runtime-verified in dev).
#
# WHY: go2rtc's API has no per-endpoint auth and supports `exec:` sources (=> RCE
# if reachable). go2rtc itself cannot lock this down, so the network boundary
# must. This proxy:
#   - terminates client auth (and TLS in production),
#   - exposes ONLY the read/playback endpoints browsers need,
#   - BLOCKS the stream-management endpoints (PUT/DELETE /api/streams) and any
#     other management path from clients,
#   - keeps go2rtc bound to 127.0.0.1 (see go2rtc.yaml) so it is never directly
#     reachable on the LAN. The backend manages streams over loopback.
#
# Adjust hostnames/paths/TLS to your environment before use. Test in staging.
# ─────────────────────────────────────────────────────────────────────────────

upstream go2rtc {
    server 127.0.0.1:1984;
}

server {
    listen 443 ssl;
    server_name nvr.example.com;

    # ssl_certificate     /etc/ssl/certs/nvr.crt;
    # ssl_certificate_key /etc/ssl/private/nvr.key;

    # Require auth for everything proxied to go2rtc.
    auth_basic           "NVR media";
    auth_basic_user_file /etc/nginx/.htpasswd;   # htpasswd -c /etc/nginx/.htpasswd viewer

    # ── Block stream management explicitly (defense in depth) ──
    # Only GET is ever needed by a browser. PUT/DELETE create/remove streams
    # (and exec: sources) — never allow them from clients.
    location /api/streams {
        limit_except GET { deny all; }
        # Even GET on /api/streams leaks the full stream list incl. RTSP creds —
        # block it entirely from clients; the backend reads it over loopback.
        return 403;
    }

    # ── Read-only media endpoints the browser legitimately uses ──
    location = /api/webrtc {            # WebRTC signaling (POST offer → answer)
        proxy_pass http://go2rtc;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
    location = /api/ws {                # MSE/WS low-latency transport
        proxy_pass http://go2rtc;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
    location = /api/stream.m3u8 { proxy_pass http://go2rtc; }  # HLS playlist
    location ~ ^/api/(hls|mp4|frame) { proxy_pass http://go2rtc; }  # HLS segments / snapshots

    # Everything else under /api (management, config, restart, etc.) is denied.
    location /api/ { return 403; }
}

# NOTE: WebRTC media still flows over UDP/TCP :8555 directly between the browser
# and go2rtc; this proxy only fronts the HTTP API. For remote clients, expose
# :8555 and set a public `webrtc.candidates` entry, or use the HLS/MSE path which
# rides entirely over this HTTPS proxy.
